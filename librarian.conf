# ─── Librarian configuration ────────────────────────────────────────────────
#
# Central, edit-in-place settings for the librarian and its scripts. This file is
# sourced as plain shell (KEY=value, no quotes needed) and is also read by the
# Python MCP server, so one edit here applies everywhere: ask.sh, digest.sh,
# backfill.sh, init.sh, and the ask_librarian MCP tool.
#
# Each setting uses `:=`, so an environment variable of the same name still wins.
# That lets you keep a permanent default here and still override it for a single
# run, e.g.:   LIBRARIAN_MODEL=opus bash utils/ask.sh "the hard question"

# LIBRARIAN_AGENT — which AI terminal CLI the librarian uses.
# Supports `agy` (Google Antigravity CLI, the default) or `claude` (Claude Code).
# Note the two CLIs differ: `agy` loads its instructions from AGENTS.md (a symlink
# to CLAUDE.md here) and has no tool-allowlist flag, so under `agy` the librarian's
# read-only scope is enforced by those instructions, not by the CLI.
: "${LIBRARIAN_AGENT:=agy}"

# LIBRARIAN_MODEL — which model the librarian runs on. Passed straight to the
# agent's `--model` flag: a friendly alias (sonnet, opus, haiku) or a full model
# id. `agy` also accepts these aliases (see `agy models` for the full list).
#
# Sonnet is the default: fast and economical, and ample for reading the mirror
# and citing sources. Switch to opus for the hardest questions or richest maps.
: "${LIBRARIAN_MODEL:=sonnet}"

# LIBRARIAN_AGY_PRINT_TIMEOUT — only used when LIBRARIAN_AGENT=agy. agy's print
# mode caps itself at 5m by default, which can truncate the long aggregation
# passes in digest.sh; raise it here (a Go duration string, e.g. 30m, 1h).
: "${LIBRARIAN_AGY_PRINT_TIMEOUT:=30m}"


# ─── Cold-start backfill (utils/backfill.sh) ─────────────────────────────────
#
# Tune the paced, resumable knowledge build. These matter mainly on the first
# run over a fresh mirror; steady-state syncs are cheap. The build reads them at
# startup, so after changing one, restart the backfill for it to take effect — it
# resumes safely, skipping repos already mapped at their current commit.

# BACKFILL_PACE_SECONDS — seconds to sleep between deep-map cycles. The pacing
# keeps each batch inside a fresh Claude usage window. Lower it to go faster if
# you have headroom; 0 never waits. Default 7200 (2h).
: "${BACKFILL_PACE_SECONDS:=450}"

# BACKFILL_BATCH — repos deep-mapped per cycle. Bigger = fewer cycles and fewer
# pacing waits; if it's ≥ the repos remaining, the build finishes in one cycle
# with no sleep at all. Default 20.
: "${BACKFILL_BATCH:=20}"

# BACKFILL_STUB_BATCH — repos per Claude turn in the Stage A stub pass (shallow,
# many-per-turn breadth). Default 12.
: "${BACKFILL_STUB_BATCH:=12}"

# BACKFILL_RETRIES — transient-failure retries per task before giving up. Default 3.
: "${BACKFILL_RETRIES:=3}"

# BACKFILL_CONCURRENCY — parallel workers within a batch. Defaults to the CPU core
# count and is hard-capped at 10 in backfill.sh to spare usage limits. Leave it
# commented to use the default; uncomment to pin a value (still capped at 10).
# : "${BACKFILL_CONCURRENCY:=10}"

# Stage A (provisional stubs) auto-runs on a cold start. Uncomment to force it on
# a warm run (BACKFILL_STUBS), or to skip it even on a cold start (BACKFILL_NO_STUBS).
# : "${BACKFILL_STUBS:=1}"
# : "${BACKFILL_NO_STUBS:=1}"


# ─── Sync & HTTP server (init.sh) ────────────────────────────────────────────

# LIBRARIAN_SYNC_INTERVAL — how often the librarian re-syncs the mirror (the bash
# sync daemon's `sleep` between loop.sh runs). Any duration `sleep` accepts, e.g.
# 5m, 15m, 1h. A positional arg to init.sh (`bash init.sh 5m`) still overrides
# this. Default 15m.
: "${LIBRARIAN_SYNC_INTERVAL:=15m}"

# LIBRARIAN_SYNC_CONCURRENCY — how many repos loop.sh clones/pulls in parallel.
# Syncing is network-bound, so this is the main lever on how fast a sync finishes.
# Raise it for a big mirror on a fast connection; lower it if you hit GitHub
# connection limits or saturate bandwidth. Default 8.
: "${LIBRARIAN_SYNC_CONCURRENCY:=15}"

# LIBRARIAN_HOST / LIBRARIAN_PORT — bind address for the remote HTTP MCP server.
# Keep the host on 127.0.0.1 and front it with HTTPS/SSH for remote access (the
# bearer token is cleartext over plain HTTP). Defaults: 127.0.0.1 : 8008.
: "${LIBRARIAN_HOST:=127.0.0.1}"
: "${LIBRARIAN_PORT:=8008}"

# LIBRARIAN_ALLOWED_HOSTS — comma-separated `Host` header values the HTTP MCP
# server will accept. FastMCP's Streamable HTTP app has DNS-rebinding protection
# that allowlists the Host header (localhost only by default) and rejects anything
# else with HTTP 421 ("Invalid Host header") — so when you front the server with a
# reverse proxy / tunnel (Cloudflare, nginx, …), requests arrive bearing the PUBLIC
# hostname and get refused, and the MCP client just sees the connection drop. List
# the public hostname(s) here (a ":*" suffix wildcards the port). Leave it empty to
# disable the Host check entirely — the bearer token already authenticates every
# request, which a browser DNS-rebinding attack can't forge.
: "${LIBRARIAN_ALLOWED_HOSTS:=bgx-librarian.bikinrame.com}"

# Skip a service entirely on boot. Uncomment to disable the HTTP MCP server, or to
# skip the cold-start backfill, when running init.sh.
# : "${LIBRARIAN_NO_HTTP:=1}"
# : "${LIBRARIAN_NO_BACKFILL:=1}"


# ─── Librarian queries (mcp/ — ask_librarian, search_code) ───────────────────

# LIBRARIAN_ASK_TIMEOUT — seconds an ask_librarian query may run before it's
# killed. Raise it for big mirrors / deep cross-repo questions. Default 300 (5m).
: "${LIBRARIAN_ASK_TIMEOUT:=300}"

# LIBRARIAN_SEARCH_CAP — max grep matches search_code returns. Default 50.
: "${LIBRARIAN_SEARCH_CAP:=50}"

# LIBRARIAN_LINE_CAP — max characters of each matched line search_code returns,
# so one long minified line can't flood the result. Default 300.
: "${LIBRARIAN_LINE_CAP:=300}"
